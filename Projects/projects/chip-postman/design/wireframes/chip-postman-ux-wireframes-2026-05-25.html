<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chip Postman UX Wireframes</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
    --screen: #ffffff;
    --board: #eef6e8;
    --control: #dbeafe;
    --control2: #fef3c7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
      --screen: #111827;
      --board: #16341f;
      --control: #1e3a8a;
      --control2: #78350f;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font:
      14px/1.4 ui-sans-serif,
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      sans-serif;
  }
  main {
    max-width: 1180px;
    margin: 32px auto;
    padding: 0 20px 40px;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 24px;
  }
  p {
    max-width: 820px;
    margin: 0 0 20px;
    color: var(--muted);
  }
  svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .title {
    font-size: 20px;
    font-weight: 700;
    fill: var(--fg);
  }
  .phone-title {
    font-size: 15px;
    font-weight: 700;
    fill: var(--fg);
  }
  .label {
    font-size: 12px;
    font-weight: 650;
    fill: var(--fg);
  }
  .small {
    font-size: 10px;
    fill: var(--muted);
  }
  .tiny {
    font-size: 9px;
    fill: var(--muted);
  }
  .phone {
    fill: var(--screen);
    stroke: var(--line);
    stroke-width: 1.5;
  }
  .notch {
    fill: var(--neutral);
  }
  .node {
    stroke: var(--line);
    stroke-width: 1;
  }
  .neutral {
    fill: var(--neutral);
  }
  .input {
    fill: var(--input);
  }
  .process {
    fill: var(--process);
  }
  .storage {
    fill: var(--storage);
  }
  .external {
    fill: var(--external);
  }
  .risk {
    fill: var(--risk);
  }
  .board {
    fill: var(--board);
    stroke: var(--line);
    stroke-width: 1;
  }
  .hud {
    fill: var(--neutral);
    stroke: var(--line);
    stroke-width: 1;
  }
  .control {
    fill: var(--control);
    stroke: var(--line);
    stroke-width: 1;
  }
  .control2 {
    fill: var(--control2);
    stroke: var(--line);
    stroke-width: 1;
  }
  .zone {
    fill: none;
    stroke: var(--line);
    stroke-width: 1;
    stroke-dasharray: 6 5;
    opacity: 0.9;
  }
  .road {
    stroke: var(--line);
    stroke-width: 1;
    opacity: 0.55;
  }
  .parcel {
    fill: var(--external);
    stroke: var(--line);
    stroke-width: 1;
  }
  .house {
    fill: var(--storage);
    stroke: var(--line);
    stroke-width: 1;
  }
</style>
<main>
  <h1>Chip Postman UX Wireframes</h1>
  <p>Board-first mobile layout: compact menus, slim in-game HUD, full-screen board, thumb-zone arrow controls, and a top-controls accessibility option.</p>

  <svg viewBox="0 0 1120 970" role="img" aria-labelledby="wireframe-title wireframe-desc">
    <title id="wireframe-title">Chip Postman mobile UX wireframes</title>
    <desc id="wireframe-desc">Five phone wireframes showing landing, settings, game board, bottom controls, and top controls option.</desc>

    <text x="24" y="34" class="title">Chip Postman UX rethink</text>
    <text x="24" y="56" class="small">Goal: reclaim board space by moving options out of gameplay and reducing controls to compact arrow zones.</text>

    <!-- Phone 1: Landing -->
    <g transform="translate(36 90)">
      <text x="0" y="-18" class="phone-title">1. Landing page</text>
      <rect x="0" y="0" width="210" height="410" rx="22" class="phone" />
      <rect x="75" y="12" width="60" height="8" rx="4" class="notch" />
      <text x="105" y="58" text-anchor="middle" class="label">CHIP POSTMAN</text>
      <rect x="58" y="80" width="94" height="70" rx="8" class="external node" />
      <text x="105" y="112" text-anchor="middle" class="label">cute</text>
      <text x="105" y="128" text-anchor="middle" class="label">postman</text>
      <rect x="34" y="180" width="142" height="42" rx="7" class="process node" />
      <text x="105" y="206" text-anchor="middle" class="label">PLAY</text>
      <rect x="34" y="236" width="142" height="32" rx="6" class="neutral node" />
      <text x="105" y="257" text-anchor="middle" class="small">Options</text>
      <rect x="34" y="278" width="142" height="32" rx="6" class="neutral node" />
      <text x="105" y="299" text-anchor="middle" class="small">How to play</text>
      <rect x="34" y="320" width="142" height="32" rx="6" class="neutral node" />
      <text x="105" y="341" text-anchor="middle" class="small">Scores</text>
      <text x="105" y="380" text-anchor="middle" class="tiny">No gameplay controls here</text>
    </g>

    <!-- Phone 2: Options -->
    <g transform="translate(300 90)">
      <text x="0" y="-18" class="phone-title">2. Options / settings</text>
      <rect x="0" y="0" width="210" height="410" rx="22" class="phone" />
      <rect x="75" y="12" width="60" height="8" rx="4" class="notch" />
      <text x="105" y="50" text-anchor="middle" class="label">OPTIONS</text>
      <rect x="20" y="76" width="170" height="38" rx="6" class="neutral node" />
      <text x="36" y="100" class="small">Sound</text>
      <rect x="145" y="88" width="28" height="14" rx="7" class="storage node" />
      <rect x="20" y="124" width="170" height="38" rx="6" class="neutral node" />
      <text x="36" y="148" class="small">Music</text>
      <rect x="145" y="136" width="28" height="14" rx="7" class="storage node" />
      <rect x="20" y="172" width="170" height="52" rx="6" class="input node" />
      <text x="36" y="196" class="small">Controls position</text>
      <text x="36" y="214" class="tiny">Bottom / Top</text>
      <rect x="20" y="234" width="170" height="52" rx="6" class="input node" />
      <text x="36" y="258" class="small">Control style</text>
      <text x="36" y="276" class="tiny">D-pad / split arrows</text>
      <rect x="20" y="296" width="170" height="38" rx="6" class="neutral node" />
      <text x="36" y="320" class="small">Haptics</text>
      <rect x="145" y="308" width="28" height="14" rx="7" class="storage node" />
      <rect x="42" y="354" width="126" height="34" rx="6" class="process node" />
      <text x="105" y="376" text-anchor="middle" class="small">Back</text>
    </g>

    <!-- Phone 3: In-game board first -->
    <g transform="translate(564 90)">
      <text x="0" y="-18" class="phone-title">3. Game: slim HUD</text>
      <rect x="0" y="0" width="210" height="410" rx="22" class="phone" />
      <rect x="75" y="12" width="60" height="8" rx="4" class="notch" />
      <rect x="14" y="32" width="182" height="34" rx="5" class="hud" />
      <text x="24" y="54" class="tiny">Score 1240</text>
      <text x="89" y="54" class="tiny">Parcels 3</text>
      <text x="151" y="54" class="tiny">1:12</text>
      <text x="181" y="54" class="tiny">II</text>
      <rect x="14" y="74" width="182" height="286" rx="8" class="board" />
      <line x1="34" y1="104" x2="176" y2="104" class="road" />
      <line x1="34" y1="164" x2="176" y2="164" class="road" />
      <line x1="34" y1="224" x2="176" y2="224" class="road" />
      <line x1="70" y1="86" x2="70" y2="342" class="road" />
      <line x1="140" y1="86" x2="140" y2="342" class="road" />
      <rect x="48" y="122" width="24" height="20" rx="3" class="house" />
      <rect x="145" y="184" width="24" height="20" rx="3" class="house" />
      <rect x="94" y="250" width="20" height="16" rx="3" class="parcel" />
      <circle cx="108" cy="184" r="8" class="process node" />
      <rect x="18" y="366" width="78" height="32" rx="8" class="control" />
      <text x="57" y="386" text-anchor="middle" class="tiny">left thumb</text>
      <rect x="114" y="366" width="78" height="32" rx="8" class="control2" />
      <text x="153" y="386" text-anchor="middle" class="tiny">right thumb</text>
    </g>

    <!-- Phone 4: Bottom thumb controls -->
    <g transform="translate(168 550)">
      <text x="0" y="-18" class="phone-title">4. Bottom arrow zones</text>
      <rect x="0" y="0" width="210" height="410" rx="22" class="phone" />
      <rect x="75" y="12" width="60" height="8" rx="4" class="notch" />
      <rect x="14" y="32" width="182" height="34" rx="5" class="hud" />
      <text x="25" y="54" class="tiny">Score</text>
      <text x="88" y="54" class="tiny">Parcels</text>
      <text x="152" y="54" class="tiny">Timer</text>
      <rect x="14" y="74" width="182" height="310" rx="8" class="board" />
      <line x1="34" y1="118" x2="176" y2="118" class="road" />
      <line x1="34" y1="190" x2="176" y2="190" class="road" />
      <line x1="34" y1="262" x2="176" y2="262" class="road" />
      <line x1="72" y1="94" x2="72" y2="350" class="road" />
      <line x1="138" y1="94" x2="138" y2="350" class="road" />
      <rect x="24" y="302" width="70" height="70" rx="12" class="zone" />
      <rect x="116" y="302" width="70" height="70" rx="12" class="zone" />
      <circle cx="59" cy="337" r="25" class="control" />
      <text x="59" y="318" text-anchor="middle" class="tiny">up</text>
      <text x="59" y="361" text-anchor="middle" class="tiny">down</text>
      <text x="39" y="341" text-anchor="middle" class="tiny">left</text>
      <text x="79" y="341" text-anchor="middle" class="tiny">right</text>
      <rect x="132" y="322" width="38" height="30" rx="7" class="control2" />
      <text x="151" y="342" text-anchor="middle" class="tiny">action</text>
      <text x="105" y="400" text-anchor="middle" class="tiny">Thumb zones reserved only</text>
    </g>

    <!-- Phone 5: Top controls option -->
    <g transform="translate(432 550)">
      <text x="0" y="-18" class="phone-title">5. Optional top controls</text>
      <rect x="0" y="0" width="210" height="410" rx="22" class="phone" />
      <rect x="75" y="12" width="60" height="8" rx="4" class="notch" />
      <rect x="14" y="32" width="182" height="34" rx="5" class="hud" />
      <text x="25" y="54" class="tiny">Score</text>
      <text x="88" y="54" class="tiny">Parcels</text>
      <text x="152" y="54" class="tiny">Timer</text>
      <rect x="14" y="74" width="182" height="58" rx="8" class="input node" />
      <rect x="25" y="85" width="58" height="36" rx="8" class="control" />
      <text x="54" y="107" text-anchor="middle" class="tiny">D-pad</text>
      <rect x="126" y="85" width="58" height="36" rx="8" class="control2" />
      <text x="155" y="107" text-anchor="middle" class="tiny">action</text>
      <rect x="14" y="140" width="182" height="244" rx="8" class="board" />
      <line x1="34" y1="176" x2="176" y2="176" class="road" />
      <line x1="34" y1="236" x2="176" y2="236" class="road" />
      <line x1="34" y1="296" x2="176" y2="296" class="road" />
      <line x1="72" y1="158" x2="72" y2="360" class="road" />
      <line x1="138" y1="158" x2="138" y2="360" class="road" />
      <text x="105" y="404" text-anchor="middle" class="tiny">Preference: Controls position = Top</text>
    </g>

    <!-- Notes panel -->
    <g transform="translate(696 558)">
      <rect x="0" y="0" width="360" height="318" rx="10" class="neutral node" />
      <text x="20" y="32" class="label">UX decisions</text>
      <text x="20" y="62" class="small">1. Move settings out of active gameplay.</text>
      <text x="20" y="92" class="small">2. Keep HUD to score, parcels, timer, pause.</text>
      <text x="20" y="122" class="small">3. Board gets the full center of the screen.</text>
      <text x="20" y="152" class="small">4. Controls are small arrow zones, not panels.</text>
      <text x="20" y="182" class="small">5. Bottom is default for thumb reach.</text>
      <text x="20" y="212" class="small">6. Top controls are an accessibility option.</text>
      <text x="20" y="252" class="label">First implementation step</text>
      <text x="20" y="282" class="small">Ship slim HUD + bottom thumb controls first,</text>
      <text x="20" y="304" class="small">then add settings for control placement.</text>
    </g>
  </svg>
</main>
